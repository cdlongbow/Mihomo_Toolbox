# ==================== 核心配置 ====================
mode: rule
port: 0
socks-port: 0
redir-port: 0
mixed-port: 0
tproxy-port: 0
ipv6: true
allow-lan: false
bind-address: '*'
unified-delay: true
tcp-concurrent: true
log-level: error
find-process-mode: off
keep-alive-interval: 15
keep-alive-idle: 600
etag-support: true
disable-keep-alive: false
experimental:
  quic-go-disable-gso: false
  quic-go-disable-ecn: true
  dialer-ip4p-convert: false
profile:
  store-selected: true
  store-fake-ip: true
  smart-collector-size: 100
hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
    - '2400:3200::1'
    - '2400:3200:baba::1'
  doh.pub:
    - 120.53.53.53
    - 1.12.12.21
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
    - '2001:4860:4860::8888'
    - '2001:4860:4860::8844'
  dns.quad9.net:
    - 9.9.9.9
    - 149.112.112.112
    - '2620:fe::fe'
    - '2620:fe::9'
  services.googleapis.cn: services.googleapis.com
  google.cn: google.com
  cn.bing.com: global.bing.com


# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  skip-domain:
    - 'rule-set:ads,proxy@direct,ai,download,safe,google,media,proxy-lite,direct-lite,dnsmasq-china-lite'
  skip-src-address:
    - 'rule-set:telegram_ip,safe_ip,google_ip,media_ip,direct_ip'


# ==================== TUN 模式 ====================
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  disable-icmp-forwarding: true
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'
  udp-timeout: 600


# ==================== DNS 配置 ====================
dns:
  enable: true
  ipv6: true
  ipv6-timeout: 300
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: false
  prefer-h3: true
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-range6: 'fd00:a4c5:9b12:d3f8:e760:00df::/96'
  fake-ip-ttl: 1
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - 'RULE-SET,ads,fake-ip'
    - 'RULE-SET,proxy@direct,real-ip'
    - 'RULE-SET,ai,fake-ip'
    - 'RULE-SET,download,fake-ip'
    - 'RULE-SET,safe,fake-ip'
    - 'RULE-SET,google,fake-ip'
    - 'RULE-SET,media,fake-ip'
    - 'RULE-SET,proxy-lite,fake-ip'
    - 'RULE-SET,direct-lite,real-ip'
    - 'MATCH,fake-ip'
  default-nameserver:
    - 223.6.6.6
    - 119.29.29.29
  proxy-server-nameserver:
    - 'https://dns.alidns.com/dns-query#直接连接'
    - 'https://doh.pub/dns-query#直接连接&h3=false'
  nameserver:
    - 'https://dns.google/dns-query#代理DNS'
    - 'https://dns.quad9.net/dns-query#代理DNS'
  nameserver-policy:
    rule-set:ads:
      - 'rcode://name_error'
    rule-set:proxy@direct:
      - 'https://dns.alidns.com/dns-query#直接连接'
      - 'https://doh.pub/dns-query#直接连接&h3=false'
    rule-set:ai,download,safe,google,media,proxy-lite:
      - 'rcode://success'
    rule-set:direct-lite,dnsmasq-china-lite:
      - 'https://dns.alidns.com/dns-query#直接连接'
      - 'https://doh.pub/dns-query#直接连接&h3=false'
  direct-nameserver:
    - 'https://dns.alidns.com/dns-query#直接连接'
    - 'https://doh.pub/dns-query#直接连接&h3=false'
  direct-nameserver-follow-policy: true


# ==================== 静态代理节点 ====================
