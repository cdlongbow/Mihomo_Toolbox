# ==================== 锚点配置 ====================
FilterHK: &FilterHK '(?i)港|🇭🇰|\bHK\b|hongkong|hong.?kong'
FilterTW: &FilterTW '(?i)台湾|台灣|🇹🇼|\bTW\b|taiwan'
FilterSG: &FilterSG '(?i)新加坡|🇸🇬|\bSG\b|singapore'
FilterJP: &FilterJP '(?i)日本|🇯🇵|\bJP\b|japan'
FilterKR: &FilterKR '(?i)韩|🇰🇷|\bKR\b|korea'
FilterUS: &FilterUS '(?i)(?!.*aus)(美|🇺🇸|\bUS\b|\bUSA\b|united.?states)'
FilterCA: &FilterCA '(?i)加拿大|🇨🇦|\bCA\b|canada'
FilterEU: &FilterEU '(?i)英|🇬🇧|\bUK\b|\bGB\b|united.?kingdom'
FilterDE: &FilterDE '(?i)德|🇩🇪|\bDE\b|germany'
FilterMY: &FilterMY '(?i)马来|🇲🇾|\bMY\b|malaysia'
FilterTR: &FilterTR '(?i)土耳其|🇹🇷|\bTR\b|turkey'
FilterAU: &FilterAU '(?i)澳|🇦🇺|\bAU\b|australia'
SelectAL: &SelectAL {type: select, proxies: [选择代理, 香港节点, 台湾节点, 新加坡节点, 日本节点, 韩国节点, 美国节点, 加拿大节点, 英国节点, 德国节点, 马来西亚节点, 土耳其节点, 澳大利亚节点, 手动选择, DIRECT]}


# ==================== 代理提供者 ====================
proxy-providers:
  Airport-01: {type: http, url: YOUR_SUBSCRIPTION_URL_HERE, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, override: {additional-prefix: '[A1]'}}


# ==================== 核心配置 ====================

# GEO 数据
geodata-mode: true
geox-url:
  geoip: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat'
  geosite: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat'
  mmdb: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb'
  asn: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb'


# ==================== 流量嗅探 ====================
sniffer:
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080
        - 8880
    QUIC:
      ports:
        - 443
        - 8443
  override-destination: false
  enable: true
  force-dns-mapping: true
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - +.push.apple.com


# ==================== TUN 模式 ====================
tun:
  enable: false
  stack: gvisor
  device: mihomo
  route-exclude-address:
    - 100.64.0.0/10
    - 'fd7a:115c:a1e0::/48'
    - 192.168.0.0/16
    - 'fd00::/8'
  dns-hijack:
    - 'any:53'
  mtu: 1500


# ==================== DNS 配置 ====================
dns:
  enable: true
  ipv6: false
  prefer-h3: true
  enhanced-mode: fake-ip
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29
    - 180.184.1.1
  fallback:
    - 'quic://dns0.eu'
    - 'https://dns.cloudflare.com/dns-query'
    - 'https://dns.sb/dns-query'
    - 'tcp://208.67.222.222'
    - 'tcp://8.26.56.2'
  proxy-server-nameserver:
    - 'https://dns.alidns.com/dns-query'
    - 'tls://dot.pub'
  fake-ip-filter:
    - 'geosite:private'
    - 'geosite:connectivity-check'
    - Mijia Cloud
    - dig.io.mi.com
    - localhost.ptlogin2.qq.com
    - '*.icloud.com'
    - '*.stun.*.*'
    - '*.stun.*.*.*'


