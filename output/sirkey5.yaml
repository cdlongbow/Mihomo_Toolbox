# ==================== 文件信息 ====================
# 名称: sirkey5
# 来源: https://raw.githubusercontent.com/sirkey5/clash--singbox--subsotre.js/refs/heads/main/clash-verge%26flclash%26mihomo.js
# 说明: sirkey5 Mihomo 深度优化脚本 v5.1-fixed
# 生成: 2026-06-17T01:09:00.092Z
# ⚠  proxy-providers 中的 url 请替换为真实订阅地址
# ====================================================

# ==================== 锚点配置 ====================
FilterHK: &FilterHK '(?i)港|🇭🇰|\bHK\b|hongkong|hong.?kong'
FilterJP: &FilterJP '(?i)日本|🇯🇵|\bJP\b|japan'
FilterSG: &FilterSG '(?i)新加坡|🇸🇬|\bSG\b|singapore'
FilterUS: &FilterUS '(?i)(?!.*aus)(美|🇺🇸|\bUS\b|\bUSA\b|united.?states)'
FilterKR: &FilterKR '(?i)韩|🇰🇷|\bKR\b|korea'
FilterEU: &FilterEU '(?i)英|🇬🇧|\bUK\b|\bGB\b|united.?kingdom'
FilterDE: &FilterDE '(?i)德|🇩🇪|\bDE\b|germany'
SelectAL: &SelectAL {type: select, proxies: [手动选择, 自动选择, 智能优选, DIRECT]}


# ==================== 代理提供者 ====================
proxy-providers:
  Airport-01: {type: http, url: YOUR_SUBSCRIPTION_URL_HERE, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, override: {additional-prefix: '[A1]'}}


# ==================== 核心配置 ====================
mode: rule
mixed-port: 7890
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: info
find-process-mode: always

# 管理面板
external-ui: ui
external-controller: '127.0.0.1:9090'
secret: ''

# GEO 数据
geodata-mode: true
geox-url:
  geoip: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@latest/geoip.dat'
  geosite: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@latest/geosite.dat'
  mmdb: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@latest/geoip.metadb'
  asn: 'https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@latest/asn.mmdb'
profile:
  store-selected: true
  store-fake-ip: true


# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - +.v2ex.com
    - +.apple.com
  skip-domain:
    - Mijia Cloud
    - +.push.apple.com
    - 'geosite:private'


# ==================== TUN 模式 ====================
tun:
  enable: false
  stack: system
  dns-hijack:
    - 'any:53'
  auto-route: true
  auto-detect-interface: true


# ==================== DNS 配置 ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter:
    - '*.lan'
    - '*.local'
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
  fallback:
    - 'https://1.0.0.1/dns-query'
    - 'https://8.8.4.4/dns-query'
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
      - +.githubusercontent.com
  listen: '127.0.0.1:1053'
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  cache-algorithm: arc
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
    - 8.8.8.8
  proxy-server-nameserver:
    - 'https://223.5.5.5/dns-query'
    - 'https://119.29.29.29/dns-query'
    - 'https://8.8.8.8/dns-query'
  nameserver-policy:
    geosite:private:
      - system
    geosite:cn,steam@cn,category-games@cn,microsoft@cn,apple@cn:
      - 119.29.29.29
      - 223.5.5.5
    rule-set:acl4ssr_china,ls_cn:
      - 119.29.29.29
      - 223.5.5.5


# ==================== 策略组 ====================
