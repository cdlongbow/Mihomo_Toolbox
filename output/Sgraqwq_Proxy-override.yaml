  - {name: 流媒体, type: select, include-all: true, filter: *FilterHK, proxies: [节点选择, 自动选择, 故障转移, DIRECT], icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ForeignMedia.png'}
  - {name: Google, type: select, include-all: true, filter: *FilterHK, proxies: [节点选择, 自动选择, 故障转移, DIRECT], icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google.png'}
  - {name: 开发工具, type: select, include-all: true, filter: *FilterHK, proxies: [节点选择, 自动选择, 故障转移, DIRECT], icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png'}
