  - {name: 苹果, type: select, include-all: true, filter: *FilterHK, proxies: [DIRECT, 节点选择, 自动选择, 故障转移], icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Apple.png'}
  - {name: 微软, type: select, include-all: true, filter: *FilterHK, proxies: [DIRECT, 节点选择, 自动选择, 故障转移], icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Microsoft.png'}
