# ==================== 文件信息 ====================
# 名称: Sgraqwq_Proxy-override
# 来源: https://raw.githubusercontent.com/Sgraqwq/Proxy-override/refs/heads/main/proxy-override.js
# 说明: Sgraqwq_Proxy-override
# 生成: 2026-06-17T01:08:59.900Z
# ⚠  proxy-providers 中的 url 请替换为真实订阅地址
# ====================================================

# ==================== 锚点配置 ====================
FilterHK: &FilterHK '(?i)港|🇭🇰|\bHK\b|hongkong|hong.?kong'


# ==================== 代理提供者 ====================
proxy-providers:
  Airport-01: {type: http, url: YOUR_SUBSCRIPTION_URL_HERE, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, override: {additional-prefix: '[A1]'}}


# ==================== 核心配置 ====================
mode: rule
mixed-port: 7890
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: info
find-process-mode: strict
keep-alive-interval: 15
keep-alive-idle: 30

# 管理面板
external-controller: '127.0.0.1:9090'

# GEO 数据
geox-url:
  geosite: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat'
  geoip: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat'
profile:
  store-selected: true
  store-fake-ip: false


# ==================== 流量嗅探 ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - +.netlify.app
    - +.vercel.app
    - +.workers.dev
  skip-domain:
    - +.mijia.cloud
    - +.oray.com
    - +.oray.net
    - +.apple.com


# ==================== TUN 模式 ====================
tun:
  enable: false
  stack: system
  dns-hijack:
    - 'any:53'
  auto-route: true
  auto-detect-interface: true


# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: '127.0.0.1:1053'
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - +.localhost
    - +.direct
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.baidu.com
    - +.bilibili.com
    - +.bing.com
    - +.chiphell.com
    - +.oray.com
    - +.sunlogin.com
    - +.todesk.com
    - +.rustdesk.com
    - +.teamviewer.com
    - +.anydesk.com
    - +.tailscale.com
    - +.zerotier.com
    - +.nvidia.com
    - +.ntp.org
    - +.pool.ntp.org
    - +.time.apple.com
    - +.time.google.com
    - +.time.nist.gov
    - time.windows.com
    - ip.cip.cc
    - captive.apple.com
    - connectivitycheck.gstatic.com
    - id6.me
    - localhost.ptlogin2.qq.com
    - +.cmpassport.com
    - +.mcdn.bilivideo.cn
    - +.battlenet.com.cn
    - +.wotgame.cn
    - +.wggames.cn
    - +.wowsgame.cn
  default-nameserver:
    - 'tls://223.5.5.5'
    - 'tls://223.6.6.6'
  proxy-server-nameserver:
    - 'https://doh.pub/dns-query'
    - 'tls://223.5.5.5'
  direct-nameserver:
    - 'https://dns.alidns.com/dns-query'
  nameserver-policy:
    geosite:cn,geolocation-cn,bilibili,biliintl:
      - 'https://dns.alidns.com/dns-query'
      - 'https://doh.pub/dns-query'
      - 'tls://223.5.5.5'
      - 'tls://223.6.6.6'
    aistudio.google.com:
      - 'https://dns.cloudflare.com/dns-query'
      - 'https://dns.google/dns-query'
  nameserver:
    - 'https://dns.cloudflare.com/dns-query'
    - 'https://dns.google/dns-query'
  respect-rules: true
  direct-nameserver-follow-policy: true


# ==================== 策略组 ====================
proxy-groups:
  - {name: 节点选择, type: select, include-all: true, filter: *FilterHK, proxies: [自动选择, 故障转移, DIRECT], icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available.png'}
  - {name: 自动选择, type: url-test, interval: 300, lazy: true, url: 'http://www.gstatic.com/generate_204', tolerance: 150, include-all: true, filter: *FilterHK, icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png'}
  - {name: 故障转移, type: fallback, interval: 300, lazy: true, url: 'http://www.gstatic.com/generate_204', include-all: true, filter: *FilterHK, icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Round_Robin.png'}
  - {name: AI, type: select, include-all: true, filter: *FilterHK, proxies: [节点选择, 自动选择, 故障转移, DIRECT], icon: 'https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png'}
