# ==================== 文件信息 ====================
# 名称: flclash-scripts2
# 来源: https://raw.githubusercontent.com/ZipZhu/Flclash-scripts/main/scripts2.js
# 说明: FlClash scripts2 - 动态建组精简版
# 生成: 2026-06-13T16:11:04.178Z
# ⚠  proxy-providers 中的 url 请替换为真实订阅地址
# ====================================================

# ==================== 锚点配置 ====================
BaseUT: &BaseUT {type: url-test, interval: 300, tolerance: 50}
FilterUS: &FilterUS '(?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States'
FilterJP: &FilterJP '(?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan'
FilterSG: &FilterSG '(?i)新加坡|坡|狮城|SG|Singapore'
FilterHK: &FilterHK '(?i)港|HK|hk|Hong Kong|HongKong|hongkong'
FilterTW: &FilterTW '(?i)台|新北|彰化|TW|Taiwan'


# ==================== 代理提供者 ====================
proxy-providers:
  Airport-01: {type: http, url: YOUR_SUBSCRIPTION_URL_HERE, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, override: {additional-prefix: '[A1]'}}


# ==================== 核心配置 ====================
mode: rule
mixed-port: 7890
ipv6: false
allow-lan: false
log-level: info

# 管理面板
external-controller: '127.0.0.1:9090'


# ==================== TUN 模式 ====================
tun:
  enable: false
  stack: system
  dns-hijack:
    - 'any:53'
  auto-route: true
  auto-detect-interface: true


# ==================== DNS 配置 ====================
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  fake-ip-filter:
    - '*.lan'
    - '*.local'
  nameserver:
    - 'https://doh.pub/dns-query'
    - 'https://dns.alidns.com/dns-query'
  fallback:
    - 'https://1.0.0.1/dns-query'
    - 'https://8.8.4.4/dns-query'
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4


# ==================== 策略组 ====================
proxy-groups:
  - {name: 节点选择, type: select, proxies: [美国节点, 日本节点, 狮城节点, 香港节点, 台湾节点, 其他节点, 自动选择, 手动切换, DIRECT], icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png'}
  - {name: 自动选择, type: url-test, <<: *BaseUT, include-all: true, icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png'}
  - {name: 手动切换, type: select, include-all: true, icon: 'https://testingcf.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png'}
  - {name: 美国节点, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterUS, icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png'}
  - {name: 日本节点, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterJP, icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png'}
  - {name: 狮城节点, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterSG, icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png'}
  - {name: 香港节点, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterHK, icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png'}
  - {name: 台湾节点, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterTW, icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png'}
  - {name: 其他节点, type: url-test, <<: *BaseUT, include-all: true, icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png', exclude-filter: '美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore|港|HK|hk|Hong Kong|HongKong|hongkong|台|新北|彰化|TW|Taiwan'}
  - {name: 广告拦截, type: select, proxies: [REJECT, DIRECT], icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AdBlack.png'}
  - {name: 应用净化, type: select, proxies: [REJECT, DIRECT], icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png'}
  - {name: 漏网之鱼, type: select, proxies: [节点选择, 美国节点, 日本节点, 狮城节点, 香港节点, 台湾节点, 其他节点, 自动选择, 手动切换, DIRECT], icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png'}
  - {name: GLOBAL, type: select, include-all: true, proxies: [节点选择, 自动选择, 手动切换, 美国节点, 日本节点, 狮城节点, 香港节点, 台湾节点, 其他节点, 广告拦截, 应用净化, 漏网之鱼], icon: 'https://testingcf.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png'}


# ==================== 路由规则 ====================
rules:
  - RULE-SET,LocalAreaNetwork,DIRECT
  - RULE-SET,UnBan,DIRECT
  - RULE-SET,BanAD,广告拦截
  - RULE-SET,BanProgramAD,应用净化
  - RULE-SET,ProxyGFWlist,节点选择
  - RULE-SET,ChinaDomain,DIRECT
  - RULE-SET,ChinaCompanyIp,DIRECT
  - RULE-SET,Download,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,漏网之鱼


# ==================== 规则集 ====================
Behavior0: &Behavior0 {type: http, behavior: classical, format: text, interval: 86400}
BehaviorDN: &BehaviorDN {type: http, behavior: domain, format: text, interval: 86400}
BehaviorIP: &BehaviorIP {type: http, behavior: ipcidr, format: text, interval: 86400}

rule-providers:
  # ── 域名规则
  LocalAreaNetwork: {<<: *Behavior0, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/LocalAreaNetwork.list'}
  UnBan: {<<: *Behavior0, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/UnBan.list'}
  BanAD: {<<: *Behavior0, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanAD.list'}
  BanProgramAD: {<<: *Behavior0, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/BanProgramAD.list'}
  ProxyGFWlist: {<<: *Behavior0, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ProxyGFWlist.list'}
  ChinaDomain: {<<: *BehaviorDN, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaDomain.list'}
  Download: {<<: *Behavior0, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/Download.list'}
  # ── IP 规则
  ChinaCompanyIp: {<<: *BehaviorIP, url: 'https://testingcf.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaCompanyIp.list'}

