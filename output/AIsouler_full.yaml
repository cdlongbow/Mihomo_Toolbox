# ⚠  proxy-providers 中的 url 请替换为真实订阅地址
# ====================================================

# ==================== 锚点配置 ====================
BaseUT: &BaseUT {type: url-test, interval: 600, lazy: true, url: 'https://g.cn/generate_204', tolerance: 100, hidden: true, max-failed-times: 3, timeout: 3000}
FilterHK: &FilterHK '(?i)港|🇭🇰|\bHK\b|hongkong|hong.?kong'
FilterJP: &FilterJP '(?i)日本|🇯🇵|\bJP\b|japan'
FilterUS: &FilterUS '(?i)(?!.*aus)(美|🇺🇸|\bUS\b|\bUSA\b|united.?states)'
FilterSG: &FilterSG '(?i)新加坡|🇸🇬|\bSG\b|singapore'
FilterTW: &FilterTW '(?i)台湾|台灣|🇹🇼|\bTW\b|taiwan'
FilterKR: &FilterKR '(?i)韩|🇰🇷|\bKR\b|korea'
SelectAL: &SelectAL {type: select, proxies: [默认代理, 自动选择, 负载均衡, 香港, 日本, 美国, 新加坡, 台湾省, 其他节点]}
SelectOne: &SelectOne {type: select, proxies: [默认代理, 直连, 自动选择, 负载均衡, 香港, 日本, 美国, 新加坡, 台湾省, 其他节点]}


# ==================== 代理提供者 ====================
proxy-providers:
  Airport-01: {type: http, url: YOUR_SUBSCRIPTION_URL_HERE, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, override: {additional-prefix: '[A1]'}}


# ==================== 核心配置 ====================
ipv6: true
allow-lan: true
bind-address: '*'
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
keep-alive-interval: 60
keep-alive-idle: 600

# 管理面板
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'
external-ui: ui
external-controller: '[::]:9090'
profile:
  store-selected: true
  store-fake-ip: true
hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
  doh.pub:
    - 1.12.12.12
    - 120.53.53.53
  dns.cloudflare.com:
    - 1.1.1.1
    - 1.0.0.1
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
  services.googleapis.cn:
    - services.googleapis.com
  +.mcdn.bilivideo.com:
    - 0.0.0.0
  +.mcdn.bilivideo.cn:
    - 0.0.0.0
ntp:
  enable: true
  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 60


# ==================== TUN 模式 ====================
tun:
  enable: true
  stack: system
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'


# ==================== DNS 配置 ====================
dns:
  enable: true
  ipv6: true
  listen: ':1053'
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: 'fc00::/18'
  fake-ip-filter:
    - 'rule-set:private'
    - 'rule-set:fakeip_filter'
  proxy-server-nameserver:
    - 'https://dns.alidns.com/dns-query#DIRECT'
    - 'https://doh.pub/dns-query#DIRECT'
  proxy-server-nameserver-policy:
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 'https://dns.cloudflare.com/dns-query#默认代理'
    - 'https://dns.google/dns-query#默认代理'
  nameserver-policy:
    rule-set:cn:
      - 'https://dns.alidns.com/dns-query#DIRECT'
      - 'https://doh.pub/dns-query#DIRECT'
  direct-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29


# ==================== 静态代理节点 ====================
proxies:
  - {name: '🇨🇳 直连 | IPv4优先', type: direct, ip-version: ipv4-prefer}
  - {name: '🇨🇳 直连 | IPv6优先', type: direct, ip-version: ipv6-prefer}
  - {name: '🇨🇳 直连 | 双栈', type: direct}


