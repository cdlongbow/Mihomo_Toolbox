# ==================== д»ЈзҗҶжҸҗдҫӣиҖ… ====================
proxy-providers:
  SUB-Provider-01: {type: http, url: 'https://example.com/replace/your/subscription/url', interval: 43200, path: ./proxy-providers/SUB-Provider-01.yaml}


# ==================== ж ёеҝғй…ҚзҪ® ====================
mode: rule
mixed-port: 7890
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: false
log-level: warning
find-process-mode: strict
keep-alive-interval: 60

# з®ЎзҗҶйқўжқҝ
external-controller: '127.0.0.1:9090'
secret: ''

# GEO ж•°жҚ®
geodata-mode: false
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/geoip.dat'
  mmdb: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/Country-without-asn.mmdb'
  asn: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/geoip@release/GeoLite2-ASN.mmdb'
  geosite: 'https://cdn.jsdelivr.net/gh/v2fly/domain-list-community@release/dlc.dat'
profile:
  tracing: true
  store-selected: true
  store-fake-ip: true
hosts:
  +.clash.dev:
    - 127.0.0.1
  +.stash.dev:
    - 127.0.0.1
ntp:
  enable: true
  write-to-system: false
  server: time.apple.com
  benchmark-url: 'https://www.apple.com/library/test/success.html'
  benchmark-timeout: 5
  port: 123


# ==================== жөҒйҮҸе—…жҺў ====================
sniffer:
  enable: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - +.v2ex.com
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - +.apple.com
    - +.icloud.com
    - +.wechat.com
    - +.qpic.cn
    - +.qq.com
    - +.wechatapp.com
    - +.vivox.com
    - +.oray.com
    - +.sunlogin.net


# ==================== TUN жЁЎејҸ ====================
tun:
  enable: true
  auto-detect-interface: true
  auto-route: true
  stack: system
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'


# ==================== DNS й…ҚзҪ® ====================
dns:
  enable: true
  prefer-h3: false
  ipv6: false
  listen: '0.0.0.0:1053'
  use-hosts: true
  use-system-hosts: true
  skip-cert-verify: false
  proxy-server-nameserver:
    - system
  default-nameserver:
    - system
  direct-nameserver:
    - 'https://dns.alidns.com/dns-query'
