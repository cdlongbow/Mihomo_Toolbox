# ==================== 文件信息 ====================
# 名称: AIsouler_lite
# 来源: https://raw.githubusercontent.com/AIsouler/MyClash/refs/heads/main/Script/Script.js
# 说明: AIsouler_lite_script
# 生成: 2026-06-17T01:08:57.966Z
# ⚠  proxy-providers 中的 url 请替换为真实订阅地址
# ====================================================

# ==================== 锚点配置 ====================
BaseUT: &BaseUT {type: url-test, interval: 600, lazy: true, url: 'https://g.cn/generate_204', tolerance: 100, hidden: true, max-failed-times: 3, timeout: 3000}
FilterHK: &FilterHK '(?i)港|🇭🇰|\bHK\b|hongkong|hong.?kong'
FilterUS: &FilterUS '(?i)(?!.*aus)(美|🇺🇸|\bUS\b|\bUSA\b|united.?states)'
FilterSG: &FilterSG '(?i)新加坡|🇸🇬|\bSG\b|singapore'
FilterJP: &FilterJP '(?i)日本|🇯🇵|\bJP\b|japan'
SelectAL: &SelectAL {type: select, proxies: [默认代理, 香港, 美国, 新加坡, 其他节点]}


# ==================== 代理提供者 ====================
proxy-providers:
  Airport-01: {type: http, url: YOUR_SUBSCRIPTION_URL_HERE, interval: 86400, health-check: {enable: true, url: 'https://www.gstatic.com/generate_204', interval: 300}, override: {additional-prefix: '[A1]'}}


# ==================== 核心配置 ====================
ipv6: true
allow-lan: true
bind-address: '*'
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
keep-alive-interval: 60
keep-alive-idle: 600

# 管理面板
external-ui-url: 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip'
external-ui: ui
external-controller: '[::]:9090'
profile:
  store-selected: true
  store-fake-ip: true
hosts:
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
  doh.pub:
    - 1.12.12.12
    - 120.53.53.53
  dns.cloudflare.com:
    - 1.1.1.1
    - 1.0.0.1
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
  services.googleapis.cn:
    - services.googleapis.com
  +.mcdn.bilivideo.com:
    - 0.0.0.0
  +.mcdn.bilivideo.cn:
    - 0.0.0.0
ntp:
  enable: true
  write-to-system: false
  server: ntp.aliyun.com
  port: 123
  interval: 60


# ==================== TUN 模式 ====================
tun:
  enable: true
  stack: system
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'


# ==================== DNS 配置 ====================
dns:
  enable: true
  ipv6: true
  listen: ':1053'
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: 'fc00::/18'
  fake-ip-filter:
    - 'rule-set:private'
    - 'rule-set:fakeip_filter'
  proxy-server-nameserver:
    - 'https://dns.alidns.com/dns-query#DIRECT'
    - 'https://doh.pub/dns-query#DIRECT'
  proxy-server-nameserver-policy:
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 'https://dns.cloudflare.com/dns-query#默认代理'
    - 'https://dns.google/dns-query#默认代理'
  nameserver-policy:
    rule-set:cn:
      - 'https://dns.alidns.com/dns-query#DIRECT'
      - 'https://doh.pub/dns-query#DIRECT'
  direct-nameserver:
    - system
    - 223.5.5.5
    - 119.29.29.29


# ==================== 静态代理节点 ====================
proxies:
  - {name: '🇨🇳 直连 | IPv4优先', type: direct, ip-version: ipv4-prefer}
  - {name: '🇨🇳 直连 | IPv6优先', type: direct, ip-version: ipv6-prefer}
  - {name: '🇨🇳 直连 | 双栈', type: direct}


# ==================== 策略组 ====================
proxy-groups:
  - {name: GLOBAL, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, proxies: [默认代理, AI, Telegram, Steam, 广告拦截, 直连, 漏网之鱼, 香港-自动选择, 香港, 美国-自动选择, 美国, 新加坡-自动选择, 新加坡, 其他节点-自动选择, 其他节点], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png'}
  - {name: 默认代理, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, proxies: [香港, 美国, 新加坡, 其他节点], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png'}
  - {name: AI, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, <<: *SelectAL, icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png'}
  - {name: Telegram, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, <<: *SelectAL, icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Telegram.png'}
  - {name: Steam, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, <<: *SelectAL, icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Steam.png'}
  - {name: 广告拦截, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, proxies: [REJECT, REJECT-DROP, PASS], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Advertising.png'}
  - {name: 直连, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://connectivitycheck.platform.hicloud.com/generate_204', max-failed-times: 3, hidden: false, proxies: ['🇨🇳 直连 | IPv4优先', '🇨🇳 直连 | IPv6优先', '🇨🇳 直连 | 双栈'], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China_Map.png'}
  - {name: 漏网之鱼, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, proxies: [默认代理, 直连], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Stack.png'}
  - {name: 香港-自动选择, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterHK, exclude-type: DIRECT, icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png'}
  - {name: 香港, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, include-all: true, filter: *FilterHK, proxies: [香港-自动选择], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png'}
  - {name: 美国-自动选择, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterUS, exclude-type: DIRECT, icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png'}
  - {name: 美国, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, include-all: true, filter: *FilterUS, proxies: [美国-自动选择], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png'}
  - {name: 新加坡-自动选择, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterSG, exclude-type: DIRECT, icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png'}
  - {name: 新加坡, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, include-all: true, filter: *FilterSG, proxies: [新加坡-自动选择], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png'}
  - {name: 其他节点-自动选择, type: url-test, <<: *BaseUT, include-all: true, filter: *FilterJP, exclude-type: DIRECT, icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png'}
  - {name: 其他节点, type: select, interval: 600, lazy: true, timeout: 3000, url: 'https://g.cn/generate_204', max-failed-times: 3, hidden: false, include-all: true, filter: *FilterJP, proxies: [其他节点-自动选择], icon: 'https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/World_Map.png'}


# ==================== 路由规则 ====================
rules:
  - RULE-SET,private,直连
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,games_cn,直连
  - RULE-SET,epicgames,直连
  - RULE-SET,apple_cn,直连
  - DOMAIN,fsend.cn,直连
  - DOMAIN,international-gfe.download.nvidia.com,直连
  - RULE-SET,ai,AI
  - RULE-SET,telegram,Telegram
  - RULE-SET,telegram_ip,Telegram,no-resolve
  - RULE-SET,steam,Steam
  - RULE-SET,adblockmihomolite,广告拦截
  - RULE-SET,geolocation-!cn,默认代理
  - RULE-SET,cn_additional,直连
  - RULE-SET,cn_ip,直连
  - MATCH,漏网之鱼


# ==================== 规则集 ====================
BehaviorDN: &BehaviorDN {type: http, behavior: domain, format: mrs, interval: 86400}
BehaviorIP: &BehaviorIP {type: http, behavior: ipcidr, format: mrs, interval: 86400}

rule-providers:
  # ── 域名规则
  private: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.mrs', path-in-bundle: geo/geosite/private.mrs}
  fakeip_filter: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/wwqgtxx/clash-rules@release/fakeip-filter.mrs', path-in-bundle: geo/geosite/fakeip-filter.mrs}
  epicgames: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/epicgames.mrs', path-in-bundle: geo/geosite/epicgames.mrs}
  games_cn: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-games@cn.mrs', path-in-bundle: 'geo/geosite/category-games@cn.mrs'}
  apple_cn: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/apple@cn.mrs', path-in-bundle: 'geo/geosite/apple@cn.mrs'}
  geolocation-!cn: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/geolocation-!cn.mrs', path-in-bundle: 'geo/geosite/geolocation-!cn.mrs'}
  cn_additional: {<<: *BehaviorDN, url: 'https://static-file-global.353355.xyz/rules/cn-additional-list.mrs', path-in-bundle: geo/geosite/cn.mrs}
  cn: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/wwqgtxx/clash-rules@release/direct.mrs', path-in-bundle: geo/geosite/cn.mrs}
  ai: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-ai-!cn.mrs', path-in-bundle: 'geo/geosite/category-ai-!cn.mrs'}
  telegram: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/telegram.mrs', path-in-bundle: geo/geosite/telegram.mrs}
  steam: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/steam.mrs', path-in-bundle: geo/geosite/steam.mrs}
  adblockmihomolite: {<<: *BehaviorDN, url: 'https://fastly.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomolite.mrs', path-in-bundle: geo/geosite/category-ads-all.mrs}
  # ── IP 规则
  private_ip: {<<: *BehaviorIP, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs', path-in-bundle: geo/geoip/private.mrs}
  cn_ip: {<<: *BehaviorIP, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/cn.mrs', path-in-bundle: geo/geoip/cn.mrs}
  telegram_ip: {<<: *BehaviorIP, url: 'https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/telegram.mrs', path-in-bundle: geo/geoip/telegram.mrs}

# ==================== EOF ====================
