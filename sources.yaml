# ══════════════════════════════════════════════════════════
# proxy-providers 模板
# 按 Mihomo 官方格式填写，会注入到每个生成的 output/*.yaml 中
# ══════════════════════════════════════════════════════════
proxy_providers:
  - name: Airport-01
    type: http
    url: "YOUR_SUBSCRIPTION_URL_HERE"
    interval: 86400
    health-check:
      enable: true
      url: "https://www.gstatic.com/generate_204"
      interval: 300
    override:
      additional-prefix: "[A1]"

